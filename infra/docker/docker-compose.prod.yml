services:
  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    container_name: cephasops-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ProductionRoles__RunJobWorkers=false
      - ProductionRoles__RunGuardian=false
      - ProductionRoles__RunStorageLifecycle=false
      - ProductionRoles__RunMetricsAggregation=false
      - ProductionRoles__RunWatchdog=false
      - ProductionRoles__RunSchedulers=false
      - ProductionRoles__RunEventDispatcher=false
      - ProductionRoles__RunNotificationWorkers=false
      - ProductionRoles__RunIntegrationWorkers=false
      - ProductionRoles__RunEmailCleanup=false
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    container_name: cephasops-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ProductionRoles__RunJobWorkers=true
      - ProductionRoles__RunGuardian=true
      - ProductionRoles__RunStorageLifecycle=true
      - ProductionRoles__RunMetricsAggregation=true
      - ProductionRoles__RunWatchdog=true
      - ProductionRoles__RunSchedulers=true
      - ProductionRoles__RunEventDispatcher=true
      - ProductionRoles__RunNotificationWorkers=true
      - ProductionRoles__RunIntegrationWorkers=true
      - ProductionRoles__RunEmailCleanup=true
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

  db:
    image: postgres:16-alpine
    container_name: cephasops-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: cephasops
      POSTGRES_USER: cephasops_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cephasops_app -d cephasops"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  pgdata:
